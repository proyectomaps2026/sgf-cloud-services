<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF CLOUD | PORTAL DE SUSCRIPCIÓN</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --primary: #1a237e; --accent: #00c853; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .logo-sgf { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 30px; }
        
        /* Estados del Semáforo */
        .status-box { padding: 20px; border-radius: 15px; margin: 20px 0; font-weight: bold; border: 2px solid transparent; }
        .espera { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        .procesando { background: #fff8e1; color: #f9a825; border-color: #ffe082; }
        .generada { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }

        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-sgf { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-sgf:hover { background: #0d47a1; }
        
        .btn-download { background: var(--accent); margin-top: 15px; display: none; } /* Solo sale cuando es 'generada' */
    </style>
</head>
<body>

<div class="card" id="login-section">
    <div class="logo-sgf">SGF CLOUD SERVICES</div>
    <h3>Acceso a Suscripción</h3>
    <input type="text" id="user" placeholder="Usuario Municipal">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn-sgf" onclick="entrar()">Ingresar al Panel</button>
</div>

<div class="card" id="status-section" style="display: none;">
    <div class="logo-sgf">NODO: AYACUCHO-01</div>
    <hr>
    
    <div id="status-indicator" class="status-box espera">
        <i class="fa-solid fa-clock"></i> <span id="status-text">ESTADO: EN ESPERA DE PAGO</span>
    </div>

    <p id="msg-instruccion">Por favor, adjunte el comprobante de transferencia para activar su licencia.</p>

    <div id="form-pago">
        <input type="text" id="ref" placeholder="Nro de Referencia Bancaria">
        <input type="file" id="capture" style="margin: 10px 0;">
        <button class="btn-sgf" onclick="enviarPago()">Reportar Pago</button>
    </div>

    <button class="btn-sgf btn-download" id="btn-licencia" onclick="irAlMapa()">
        <i class="fa-solid fa-certificate"></i> LICENCIA GENERADA - ENTRAR
    </button>
</div>

<script>
    function entrar() {
        // Simulación de login
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('status-section').style.display = 'block';
    }

    function enviarPago() {
        const statusIcon = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        
        // Cambiamos a Procesando
        statusIcon.className = "status-box procesando";
        statusText.innerText = "ESTADO: VERIFICANDO PAGO...";
        document.getElementById('form-pago').style.display = 'none';
        document.getElementById('msg-instruccion').innerText = "Su reporte ha sido enviado al Administrador Maestro. Tiempo estimado: 15-30 min.";
        
        // Aquí el script enviaría el capture a tu GitHub Repo
    }

    function irAlMapa() {
        window.location.href = "index.html";
    }

    // Esta función la disparas tú desde tu Admin Master
    function simularAprobacion() {
        const statusIcon = document.getElementById('status-indicator');
        statusIcon.className = "status-box generada";
        document.getElementById('status-text').innerText = "ESTADO: LICENCIA ACTIVA";
        document.getElementById('btn-licencia').style.display = 'block';
        document.getElementById('msg-instruccion').style.display = 'none';
    }
</script>

</body>
</html>
