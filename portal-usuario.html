<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CLIENTE | NODO DE RECAUDACIÓN</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #f0f2f5; --primary: #1a237e; --accent: #00c853; --warning: #fbc02d; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        
        /* ALERTA DE CAMBIO OBLIGATORIO */
        #force-change { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; border-radius: 20px; z-index: 10; padding: 30px; box-sizing: border-box;
            text-align: center; flex-direction: column; justify-content: center;
        }

        .status-card { text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #eee; }
        .status-icon { font-size: 50px; margin-bottom: 10px; }
        
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .info-row b { color: var(--primary); }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-pay { background: var(--primary); color: white; }
        .btn-save { background: var(--accent); color: white; }

        .token-view { font-family: monospace; font-size: 10px; background: #f8f9fa; padding: 10px; border-radius: 5px; word-break: break-all; margin-top: 15px; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <div id="force-change">
        <i class="fa-solid fa-user-shield" style="font-size: 40px; color: var(--danger);"></i>
        <h2>Seguridad Requerida</h2>
        <p style="font-size: 13px; color: #666;">El Administrador Maestro ha reseteado tus credenciales o es tu primer inicio. <b>Debes actualizarlas ahora:</b></p>
        <input type="text" id="new_user" placeholder="Nuevo Usuario">
        <input type="password" id="new_pass" placeholder="Nueva Contraseña">
        <button class="btn btn-save" onclick="actualizarCredenciales()">Actualizar y Entrar</button>
    </div>

    <div id="portal-content">
        <div id="status-box" class="status-card">
            <div id="icon" class="status-icon"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
            <h2 id="txt-status" style="margin:0">Verificando...</h2>
            <p id="txt-vence" style="font-size: 12px; color: #666;"></p>
        </div>

        <div class="info-row"><span>ID Nodo:</span><b id="lbl-nodo">---</b></div>
        <div class="info-row"><span>Usuario:</span><b id="lbl-user">---</b></div>
        <div class="info-row"><span>Días Restantes:</span><b id="lbl-dias">---</b></div>

        <div id="pay-section" style="display:none;">
            <p style="font-size:12px; color:var(--danger); text-align:center; font-weight:bold;">LICENCIA VENCIDA - REGISTRE SU PAGO</p>
            <input type="text" id="ref-pago" placeholder="Referencia de Transferencia">
            <select id="metodo-pago" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                <option>Pago Móvil</option>
                <option>Transferencia Bs</option>
                <option>Zelle / Divisas</option>
            </select>
            <button class="btn btn-pay" onclick="reportarPago()"><i class="fa-solid fa-cloud-arrow-up"></i> Enviar a Auditoría</button>
        </div>

        <div id="token-display" class="token-view">Esperando Token Maestro...</div>
    </div>
</div>

<script>
    // ESTA DATA VENDRÍA DEL CONFIG.JS REMOTO EN GITHUB
    let configRemoto = JSON.parse(localStorage.getItem('sgf_config_live')) || {
        user: "admin",
        pass: "admin",
        nodo: "SC-01",
        token: "---"
    };

    function inicializarPortal() {
        // 1. Verificar si tiene las credenciales default (admin/admin)
        if(configRemoto.user === "admin" && configRemoto.pass === "admin") {
            document.getElementById('force-change').style.display = 'flex';
        } else {
            procesarToken(configRemoto.token);
        }
        
        document.getElementById('lbl-nodo').innerText = configRemoto.nodo;
        document.getElementById('lbl-user').innerText = configRemoto.user;
    }

    function actualizarCredenciales() {
        const u = document.getElementById('new_user').value;
        const p = document.getElementById('new_pass').value;

        if(u.length < 4 || p.length < 4) return alert("Usuario y clave deben tener min. 4 caracteres");
        if(u === "admin") return alert("No puedes usar 'admin' como usuario.");

        configRemoto.user = u;
        configRemoto.pass = p;
        
        // Sincronizar (Aquí enviarías a GitHub el cambio para que el Master lo vea)
        localStorage.setItem('sgf_config_live', JSON.stringify(configRemoto));
        
        document.getElementById('force-change').style.display = 'none';
        alert("Credenciales actualizadas con éxito.");
        location.reload();
    }

    function procesarToken(token) {
        const display = document.getElementById('token-display');
        const box = document.getElementById('status-box');
        const icon = document.getElementById('icon');
        const txt = document.getElementById('txt-status');
        
        display.innerText = "TOKEN: " + token;

        // DECODIFICADOR DE BARAJA SGF (E-BASURA-NODO-FECHA-SEMILLA)
        const partes = token.split('-');
        
        if(partes[0] === "E") {
            const fechaRaw = partes[3]; // "20260502"
            const anio = fechaRaw.substring(0, 4);
            const mes = fechaRaw.substring(4, 6);
            const dia = fechaRaw.substring(6, 8);
            
            const venceDate = new Date(`${anio}-${mes}-${dia}`);
            const hoy = new Date();
            
            // Cálculo de días
            const diff = venceDate - hoy;
            const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));

            if(dias > 0) {
                box.style.borderColor = "var(--accent)";
                icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:var(--accent)"></i>';
                txt.innerText = "SISTEMA ACTIVO";
                document.getElementById('txt-vence').innerText = "Vence el: " + venceDate.toLocaleDateString();
                document.getElementById('lbl-dias').innerText = dias + " días";
                document.getElementById('pay-section').style.display = 'none';
            } else {
                licenciaVencida();
            }
        } else {
            licenciaVencida();
        }
    }

    function licenciaVencida() {
        const box = document.getElementById('status-box');
        box.style.borderColor = "var(--danger)";
        document.getElementById('icon').innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)"></i>';
        document.getElementById('txt-status').innerText = "LICENCIA EXPIRADA";
        document.getElementById('pay-section').style.display = 'block';
        document.getElementById('lbl-dias').innerText = "0";
    }

    function reportarPago() {
        const ref = document.getElementById('ref-pago').value;
        if(!ref) return alert("Ingrese la referencia del pago");

        // Simulación de envío a la bandeja de auditoría del Master
        let bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
        bandeja.push({
            id: configRemoto.nodo + "-" + Math.floor(Math.random()*999),
            referencia: ref,
            metodo: document.getElementById('metodo-pago').value
        });
        localStorage.setItem('bandeja_auditoria', JSON.stringify(bandeja));

        alert("Pago reportado. El sistema se activará automáticamente cuando el Master valide el capture.");
        document.getElementById('pay-section').innerHTML = '<h3 style="color:var(--warning)"><i class="fa-solid fa-clock"></i> ESPERANDO VALIDACIÓN...</h3>';
    }

    inicializarPortal();
</script>
</body>
</html>
