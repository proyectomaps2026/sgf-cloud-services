<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CLOUD | Terminal de Inteligencia Fiscal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e; --accent: #00c853; --bg: #f0f2f5;
            --danger: #d32f2f; --warning: #f57c00; --white: #ffffff;
            --text-main: #333; --text-muted: #666;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--white); width: 100%; max-width: 850px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; margin: 20px; }
        
        /* LOGIN */
        #login-section { padding: 60px 50px; text-align: center; }
        .logo-header { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); margin-bottom: 40px; font-size: 14px; }
        .input-group { margin-bottom: 15px; max-width: 350px; margin: 0 auto 15px auto; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; max-width: 350px; }

        /* DASHBOARD */
        #status-section { display: none; }
        .panel-header { background: var(--primary); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .panel-body { padding: 40px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; }
        .card-box { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 25px; position: relative; }
        
        /* SEMÁFORO */
        .status-pill { padding: 20px; border-radius: 10px; text-align: center; font-weight: 800; font-size: 18px; margin: 20px 0; }
        .vencido { background: #ffebee; color: var(--danger); border: 1px solid #ef9a9a; }
        .activo { background: #e8f5e9; color: var(--accent); border: 1px solid #a5d6a7; }
        .proximo { background: #fff8e1; color: var(--warning); border: 1px solid #ffe082; }

        /* ACCIONES */
        .action-item { display: flex; align-items: center; background: white; padding: 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #eee; cursor: pointer; }
        .action-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .icon-red { background: #ffebee; color: var(--danger); }
        .icon-yellow { background: #fff8e1; color: var(--warning); }

        /* PAGO */
        #payment-area { margin-top: 25px; display: none; border-top: 2px solid #eee; padding-top: 20px; }
        .file-upload { background: #444; color: white; padding: 12px; border-radius: 6px; display: block; text-align: center; cursor: pointer; margin: 15px 0; }
        .file-upload input { display: none; }
        .btn-success { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #verifying-display { display: none; text-align: center; padding: 30px; background: #fffcf0; border-radius: 12px; border: 1px solid #ffe082; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <div class="logo-header"><i class="fa-solid fa-server"></i> SGF CLOUD</div>
        <div class="subtitle">NODO CENTRAL DE INTELIGENCIA FISCAL</div>
        <div class="input-group"><input type="text" id="userInput" placeholder="Usuario"></div>
        <div class="input-group"><input type="password" id="passInput" placeholder="Contraseña"></div>
        <button class="btn-main" onclick="validarLogin()">AUTENTICAR</button>
    </div>

    <div id="status-section">
        <div class="panel-header">
            <div id="display-user">SGF-NODO-LOCAL</div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="panel-body">
            <div class="main-grid">
                <div class="card-box" id="card-status">
                    <h4>Estatus del Protocolo</h4>
                    <div id="status-indicator" class="status-pill vencido"><i class="fa-solid fa-lock"></i><br>LICENCIA INACTIVA</div>
                    <p style="text-align: center; font-size: 12px;">Vence: <b id="fecha-vence">--/--/----</b></p>
                </div>
                <div class="card-box">
                    <h4>Gestión de Licencia</h4>
                    <div class="action-item" onclick="abrirPago('Renovar')">
                        <div class="action-icon icon-red"><i class="fa-solid fa-key"></i></div>
                        <div><b>Renovar Licencia</b><br><small>Restablecer puente de datos.</small></div>
                    </div>
                    <div class="action-item" onclick="abrirPago('Extender')">
                        <div class="action-icon icon-yellow"><i class="fa-solid fa-key"></i></div>
                        <div><b>Extender Licencia</b><br><small>Continuidad de auditoría.</small></div>
                    </div>
                </div>
            </div>

            <div id="payment-area">
                <div id="form-inner">
                    <select id="metodoPago" onchange="toggleCampos()" style="margin-bottom: 10px;">
                        <option value="Pago Móvil">Pago Móvil / Transferencia</option>
                        <option value="Binance Pay">Binance Pay (USDT)</option>
                        <option value="Efectivo / Acuerdo Directo">Efectivo / Acuerdo Directo</option>
                    </select>
                    <div id="campos-digitales">
                        <input type="text" id="refBancaria" placeholder="Nro de Referencia" style="margin-bottom: 10px;">
                        <label class="file-upload">
                            <input type="file" id="captureFile" onchange="actualizarNombre()">
                            <i class="fa-solid fa-camera"></i> <span id="file-label">Subir Comprobante</span>
                        </label>
                    </div>
                    <button class="btn-success" onclick="procesarPago()">SOLICITAR ACTIVACIÓN</button>
                </div>
                <div id="verifying-display">
                    <i class="fa-solid fa-gear fa-spin" style="font-size: 30px; color: var(--warning);"></i>
                    <h4>ORDEN #<span id="orden-id">---</span></h4>
                    <p id="info-verificacion" style="font-size: 12px;"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>

<script>
    // 1. LEER CONFIG AL CARGAR
    window.onload = function() {
        const status = SGF_CONFIG.status_licencia;
        const indicador = document.getElementById('status-indicator');
        document.getElementById('fecha-vence').innerText = SGF_CONFIG.vencimiento;

        if(status === "activo") {
            indicador.className = "status-pill activo";
            indicador.innerHTML = '<i class="fa-solid fa-check-double"></i><br>LICENCIA ACTIVA';
            document.getElementById('card-status').style.borderTop = "4px solid var(--accent)";
        } else {
            document.getElementById('card-status').style.borderTop = "4px solid var(--danger)";
        }
    }

    function validarLogin() {
        if(document.getElementById('userInput').value !== "" && document.getElementById('passInput').value !== "") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('status-section').style.display = 'block';
        }
    }

    function abrirPago(t) { document.getElementById('payment-area').style.display = 'block'; }
    
    function toggleCampos() {
        const esEfectivo = document.getElementById('metodoPago').value === "Efectivo / Acuerdo Directo";
        document.getElementById('campos-digitales').style.display = esEfectivo ? "none" : "block";
    }

    function actualizarNombre() {
        const file = document.getElementById('captureFile').files[0];
        if(file) document.getElementById('file-label').innerText = file.name;
    }

    async function procesarPago() {
        const metodo = document.getElementById('metodoPago').value;
        const ref = document.getElementById('refBancaria').value;
        const fileInput = document.getElementById('captureFile');
        const numOrden = "SGF-" + Math.floor(Math.random()*900000+100000);

        if(metodo !== "Efectivo / Acuerdo Directo" && !ref) return alert("Ingrese referencia.");

        // CARGA A CLOUDINARY USANDO CONFIG
        if(metodo !== "Efectivo / Acuerdo Directo" && fileInput.files[0]) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', SGF_CONFIG.preset);
            formData.append('public_id', `pago_${numOrden}`);

            fetch(`https://api.cloudinary.com/v1_1/${SGF_CONFIG.cloud_name}/image/upload`, {
                method: 'POST', body: formData
            }).then(r => r.json()).then(data => console.log("Subido:", data.secure_url));
        }

        // INTERFAZ
        document.getElementById('orden-id').innerText = numOrden;
        document.getElementById('info-verificacion').innerText = `Conciliando Ref: ${ref || 'ACUERDO'} vía ${metodo}`;
        document.getElementById('form-inner').style.display = 'none';
        document.getElementById('verifying-display').style.display = 'block';
        
        // El semáforo pasa a amarillo (Conciliando) mientras el equipo revisa
        const indicador = document.getElementById('status-indicator');
        indicador.className = "status-pill proximo";
        indicador.innerHTML = '<i class="fa-solid fa-user-shield"></i><br>CONCILIANDO...';
        
        alert("Orden generada. El equipo de auditoría ha sido notificado.");
    }
</script>
</body>
</html>
