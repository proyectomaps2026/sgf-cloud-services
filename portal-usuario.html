<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF | PORTAL DE USUARIO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* MANTENEMOS TU DISEÑO EXACTO */
        :root { --primary: #0062ff; --dark: #0a0a0c; --card: #151518; --text: #e0e0e0; --success: #00ff41; --warning: #ffcc00; --danger: #ff3333; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 380px; text-align: center; position: relative; }
        
        /* LA CAPA DE BLOQUEO (RESET) - Se activa solo si es admin/admin */
        #bloqueo-seguridad { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--card); border-radius: 20px; z-index: 100; padding: 30px; box-sizing: border-box;
            flex-direction: column; justify-content: center; align-items: center; border: 2px solid var(--danger);
        }

        .status-pill { padding: 10px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; display: inline-block; width: 80%; }
        .activo { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .proximo { background: rgba(255, 204, 0, 0.1); color: var(--warning); }
        .vencido { background: rgba(255, 51, 51, 0.1); color: var(--danger); }

        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0a0a0c; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div id="bloqueo-seguridad">
        <i class="fa-solid fa-lock" style="font-size: 40px; color: var(--danger); margin-bottom: 15px;"></i>
        <h3 style="margin:0">SEGURIDAD REQUERIDA</h3>
        <p style="font-size: 12px; color: #888;">Debes cambiar tu usuario y clave antes de continuar.</p>
        <input type="text" id="new_u" placeholder="Nuevo Usuario">
        <input type="password" id="new_p" placeholder="Nueva Contraseña">
        <button class="btn" onclick="cambiarCredencialesMaster()">ACTUALIZAR ACCESO</button>
    </div>

    <div id="status-indicator" class="status-pill proximo">
        <i class="fa-solid fa-circle-notch fa-spin"></i><br>VERIFICANDO...
    </div>

    <h2 id="node-id" style="margin: 10px 0;">---</h2>
    <p id="vence-text" style="color: #888; font-size: 14px;">Cargando licencia...</p>

    <div id="form-pago" style="display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
        <label style="font-size: 12px; display: block; text-align: left;">Referencia de Pago</label>
        <input type="text" id="refBancaria" placeholder="Número de confirmación">
        <select id="metodoPago">
            <option>Pago Móvil</option>
            <option>Zelle</option>
            <option>Efectivo / Acuerdo Directo</option>
        </select>
        <button class="btn" onclick="enviarPagoAuditoria()">INFORMAR PAGO AL MASTER</button>
    </div>

    <div id="token-maestro" style="font-size: 9px; color: #444; margin-top: 20px; word-break: break-all;">---</div>
</div>

<script>
    // ESTO VIENE DEL CONFIG.JS EN GITHUB
    let configSGF = JSON.parse(localStorage.getItem('sgf_config_live')) || {
        usuario: "admin",
        clave: "admin",
        nodo: "SC-01",
        token: "E-XJ92L-SC01-20260402-SEMILLA" // Token ejemplo
    };

    function validarSistema() {
        // 1. CHEQUEO DE RESET (Si es admin/admin, bloqueamos)
        if(configSGF.usuario === "admin" && configSGF.clave === "admin") {
            document.getElementById('bloqueo-seguridad').style.display = 'flex';
            return;
        }

        // 2. LÓGICA DE TU TOKEN (Decodificación de fecha Aura)
        const token = configSGF.token;
        document.getElementById('token-maestro').innerText = "LICENCIA: " + token;
        document.getElementById('node-id').innerText = configSGF.nodo;

        const partes = token.split('-');
        if(partes[0] === "E") {
            // Sacamos la fecha del chorizo (posición 3)
            const f = partes[3]; // 20260402
            const fechaVence = new Date(`${f.substring(0,4)}-${f.substring(4,6)}-${f.substring(6,8)}`);
            const hoy = new Date();
            
            const diff = Math.ceil((fechaVence - hoy) / (1000 * 60 * 60 * 24));

            const pill = document.getElementById('status-indicator');
            const venceTxt = document.getElementById('vence-text');
            const form = document.getElementById('form-pago');

            if(diff > 0) {
                pill.className = "status-pill activo";
                pill.innerHTML = '<i class="fa-solid fa-check-double"></i><br>LICENCIA ACTIVA';
                venceTxt.innerText = "Vence el: " + fechaVence.toLocaleDateString();
                venceTxt.style.color = "var(--success)";
                form.style.display = "none";
            } else {
                pill.className = "status-pill vencido";
                pill.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i><br>LICENCIA EXPIRADA';
                venceTxt.innerText = "Acceso restringido";
                venceTxt.style.color = "var(--danger)";
                form.style.display = "block";
            }
        }
    }

    function cambiarCredencialesMaster() {
        const u = document.getElementById('new_u').value;
        const p = document.getElementById('new_p').value;
        if(u.length < 4 || u === "admin") return alert("Usuario no válido");

        configSGF.usuario = u;
        configSGF.clave = p;
        localStorage.setItem('sgf_config_live', JSON.stringify(configSGF));
        
        alert("¡Acceso actualizado! Ahora el portal es tuyo.");
        location.reload();
    }

    function enviarPagoAuditoria() {
        const ref = document.getElementById('refBancaria').value;
        if(!ref) return alert("Falta Referencia");

        // Mandamos a la bandeja del Master
        let bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
        bandeja.push({ id: configSGF.nodo, referencia: ref, metodo: document.getElementById('metodoPago').value });
        localStorage.setItem('bandeja_auditoria', JSON.stringify(bandeja));

        alert("Pago enviado. Esperando que el Master genere tu nuevo token.");
        document.getElementById('form-pago').innerHTML = "<p style='color:var(--warning)'>Esperando validación remota...</p>";
    }

    validarSistema();
</script>

</body>
</html>
