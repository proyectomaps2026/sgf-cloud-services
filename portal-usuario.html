<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CLIENTE | PORTAL DE NODO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --accent: #00c853; --warning: #fbc02d; --danger: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .main-container { max-width: 500px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; position: relative; }

        /* BLOQUEO DE SEGURIDAD (RESET) */
        #lock-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); z-index: 100; padding: 40px; box-sizing: border-box;
            text-align: center; flex-direction: column; justify-content: center; backdrop-filter: blur(5px);
        }

        .header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }

        .status-section { padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .status-pill { display: inline-block; padding: 8px 20px; border-radius: 50px; font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 15px; }
        
        /* ESTADOS DINÁMICOS */
        .activo { background: rgba(0, 200, 83, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .vencido { background: rgba(211, 47, 47, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .espera { background: rgba(251, 192, 45, 0.1); color: var(--warning); border: 1px solid var(--warning); }

        .info-grid { padding: 20px; background: #fafafa; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-item { font-size: 13px; color: #666; }
        .info-item b { display: block; color: #333; font-size: 15px; }

        .form-section { padding: 30px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #555; font-weight: 600; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        
        .token-footer { padding: 15px; background: #f1f1f1; font-family: monospace; font-size: 10px; color: #999; word-break: break-all; text-align: center; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="lock-screen">
        <i class="fa-solid fa-user-shield" style="font-size: 50px; color: var(--danger); margin-bottom: 20px;"></i>
        <h2 style="color: var(--primary);">Actualizar Credenciales</h2>
        <p style="font-size: 14px; color: #666;">Por seguridad, debes cambiar el usuario y clave asignados por el Master.</p>
        <input type="text" id="new_u" placeholder="Nuevo Usuario Personal">
        <input type="password" id="new_p" placeholder="Nueva Contraseña">
        <button class="btn btn-accent" onclick="guardarNuevasCredenciales()">Actualizar e Ingresar</button>
    </div>

    <div class="header">
        <h1><i class="fa-solid fa-building-columns"></i> PORTAL FISCAL SGF</h1>
    </div>

    <div class="status-section">
        <div id="pill" class="status-pill espera">Verificando...</div>
        <div id="main-icon" style="font-size: 60px; margin: 15px 0;"><i class="fa-solid fa-spinner fa-spin"></i></div>
        <h2 id="status-title" style="margin: 0; color: #333;">Cargando Nodo</h2>
        <p id="status-desc" style="color: #888; font-size: 13px;">Sincronizando con el Master...</p>
    </div>

    <div class="info-grid">
        <div class="info-item">ID NODO<b id="val-nodo">---</b></div>
        <div class="info-item">VENCIMIENTO<b id="val-fecha">---</b></div>
        <div class="info-item">USUARIO<b id="val-user">---</b></div>
        <div class="info-item">ESTADO<b id="val-dias">Calculando...</b></div>
    </div>

    <div id="payment-area" class="form-section" style="display:none;">
        <h3 style="margin-top:0; font-size: 16px;"><i class="fa-solid fa-money-bill-transfer"></i> Reportar Pago de Licencia</h3>
        <label>Referencia Bancaria</label>
        <input type="text" id="pago_ref" placeholder="Ej: 98234123">
        
        <label>Método</label>
        <select id="pago_metodo">
            <option>Pago Móvil</option>
            <option>Zelle / Divisas</option>
            <option>Transferencia Bs</option>
            <option>Efectivo / Acuerdo Directo</option>
        </select>

        <label>Comprobante (Imagen)</label>
        <input type="file" id="pago_file" accept="image/*">

        <button class="btn btn-primary" onclick="enviarAuditoria()">
            <i class="fa-solid fa-cloud-arrow-up"></i> ENVIAR A REVISIÓN
        </button>
    </div>

    <div id="token-raw" class="token-footer">---</div>
</div>

<script>
    // ESTA DATA ES LA QUE EL MASTER ESCRIBE EN GITHUB
    let configNodo = JSON.parse(localStorage.getItem('sgf_config_live')) || {
        user: "admin",
        pass: "admin",
        nodo: "MICH-01",
        token: "N-A-N-A-N" // Token nulo inicial
    };

    function boot() {
        // 1. Verificar si requiere cambio de clave (admin/admin)
        if(configNodo.user === "admin" && configNodo.pass === "admin") {
            document.getElementById('lock-screen').style.display = 'flex';
        } else {
            decodificarToken(configNodo.token);
        }

        document.getElementById('val-nodo').innerText = configNodo.nodo;
        document.getElementById('val-user').innerText = configNodo.user;
        document.getElementById('token-raw').innerText = "TOKEN ACTUAL: " + configNodo.token;
    }

    function guardarNuevasCredenciales() {
        const u = document.getElementById('new_u').value;
        const p = document.getElementById('new_p').value;
        if(u.length < 4 || u === "admin") return alert("Usuario no válido");

        configNodo.user = u;
        configNodo.pass = p;
        localStorage.setItem('sgf_config_live', JSON.stringify(configNodo));
        alert("Credenciales actualizadas. Sincronizando...");
        location.reload();
    }

    function decodificarToken(token) {
        const partes = token.split('-');
        const pill = document.getElementById('pill');
        const icon = document.getElementById('main-icon');
        const title = document.getElementById('status-title');
        const payArea = document.getElementById('payment-area');

        // BARAJA: E-BASURA-NODO-FECHA-SEMILLA
        if(partes[0] === "E") {
            const f = partes[3]; // YYYYMMDD
            const venceDate = new Date(`${f.substring(0,4)}-${f.substring(4,6)}-${f.substring(6,8)}`);
            const hoy = new Date();
            const diff = Math.ceil((vceDate - hoy) / (1000 * 60 * 60 * 24));

            if(diff > 0) {
                pill.className = "status-pill activo";
                pill.innerText = "Licencia Activa";
                icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:var(--accent)"></i>';
                title.innerText = "Sistema Operativo";
                document.getElementById('val-fecha').innerText = venceDate.toLocaleDateString();
                document.getElementById('val-dias').innerText = diff + " Días restantes";
                payArea.style.display = "none";
            } else {
                marcarVencido();
            }
        } else {
            marcarVencido();
        }
    }

    function marcarVencido() {
        document.getElementById('pill').className = "status-pill vencido";
        document.getElementById('pill').innerText = "Licencia Vencida";
        document.getElementById('main-icon').innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)"></i>';
        document.getElementById('status-title').innerText = "Acceso Restringido";
        document.getElementById('payment-area').style.display = "block";
        document.getElementById('val-dias').innerText = "Expirado";
    }

    async function enviarAuditoria() {
        const ref = document.getElementById('pago_ref').value;
        const file = document.getElementById('pago_file').files[0];
        
        if(!ref) return alert("Indique referencia");
        
        // 1. Subida a Cloudinary drxiko8l4 (Opcional si tienes el preset)
        if(file) {
            alert("Subiendo comprobante a la nube...");
            // Aquí iría el fetch a Cloudinary que ya teníamos
        }

        // 2. Enviar señal a la bandeja del Master
        let bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
        bandeja.push({
            id: configNodo.nodo,
            referencia: ref,
            metodo: document.getElementById('pago_metodo').value
        });
        localStorage.setItem('bandeja_auditoria', JSON.stringify(bandeja));

        alert("Pago reportado con éxito. El Master recibirá la señal en segundos.");
        document.getElementById('payment-area').innerHTML = `<div style="text-align:center; color:var(--warning); padding:20px;">
            <i class="fa-solid fa-clock-rotate-left" style="font-size:30px;"></i><br>
            <b>ESPERANDO VALIDACIÓN</b><br>El administrador está verificando su pago.
        </div>`;
    }

    boot();
</script>
</body>
</html>
