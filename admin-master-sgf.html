<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF CLOUD | PANEL MAESTRO DE CONTROL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0062ff; --dark: #0a0a0c; --card: #151518; --text: #e0e0e0; --success: #00ff41; --warning: #ffcc00; --danger: #ff3333; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); height: 100vh; border-right: 1px solid #333; padding: 20px; position: fixed; }
        .logo { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; }
        .logo i { margin-right: 10px; }
        .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; color: #aaa; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main { margin-left: 280px; padding: 40px; width: calc(100% - 320px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Cards & Stats */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .stat-card h3 { margin: 0; font-size: 14px; color: #888; }
        .stat-card p { font-size: 24px; margin: 10px 0 0 0; font-weight: bold; }

        /* Tables */
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e1e22; padding: 15px; text-align: left; font-size: 13px; color: #888; }
        td { padding: 15px; border-top: 1px solid #333; font-size: 14px; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-active { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .status-warning { background: rgba(255, 204, 0, 0.1); color: var(--warning); }
        .status-expired { background: rgba(255, 51, 51, 0.1); color: var(--danger); }

        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-action { background: #1e1e22; color: white; font-size: 12px; border: 1px solid #333; }
        .btn-action:hover { background: #333; border-color: var(--primary); }
        
        #modalCliente { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 15px; width: 400px; border: 1px solid #444; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0a0a0c; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class="fa-solid fa-server"></i> SGF MASTER</div>
    <div class="nav-item active"><i class="fa-solid fa-users-gear"></i> Gestión de Clientes</div>
    <div class="nav-item" onclick="alert('Accediendo a Logs de Seguridad...')"><i class="fa-solid fa-receipt"></i> Bandeja de Pagos</div>
    <div class="nav-item" onclick="alert('Panel de Criptografía...')"><i class="fa-solid fa-shield-halved"></i> Seguridad Token</div>
</div>

<div class="main">
    <div class="header">
        <h1>Dashboard Administrativo</h1>
        <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Nuevo Cliente</button>
    </div>

    <div class="grid">
        <div class="stat-card">
            <h3>Nodos Activos</h3>
            <p id="totalActivos">0</p>
        </div>
        <div class="stat-card">
            <h3>Pagos por Verificar</h3>
            <p id="pagosPendientes" style="color: var(--warning)">0</p>
        </div>
        <div class="stat-card">
            <h3>Vencimientos (30 días)</h3>
            <p id="proximosVencimientos">0</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>CLIENTE / MUNICIPIO</th>
                    <th>ID NODO</th>
                    <th>ÚLTIMA REF / MÉTODO</th>
                    <th>VENCIMIENTO VIRTUAL</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="listaClientes">
                </tbody>
        </table>
    </div>
</div>

<div id="modalCliente">
    <div class="modal-content">
        <h3>Registrar Nueva Alcaldía</h3>
        <input type="text" id="nombreMun" placeholder="Nombre (Ej: San Cristóbal)">
        <input type="text" id="idNodo" placeholder="ID Nodo (Ej: SC-01)">
        <input type="text" id="githubRepo" placeholder="URL Repo GitHub del Cliente">
        <input type="password" id="githubPAT" placeholder="GitHub PAT (Token del Cliente)">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-primary" onclick="guardarCliente()" style="flex:1">Guardar</button>
            <button class="btn btn-action" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    function openModal() { document.getElementById('modalCliente').style.display = 'flex'; }
    function closeModal() { document.getElementById('modalCliente').style.display = 'none'; }

    // RENDERIZADO DE LA TABLA BASADO EN LAS ÓRDENES REALES
    function actualizarDashboard() {
        const bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
        const contenedor = document.getElementById('listaClientes');
        const countPagos = document.getElementById('pagosPendientes');
        
        countPagos.innerText = bandeja.length;
        contenedor.innerHTML = '';

        // Si no hay pagos nuevos, mostramos uno de ejemplo o vacío
        if(bandeja.length === 0) {
            contenedor.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#555; padding:40px;">No hay señales de pago activas en la red...</td></tr>';
            return;
        }

        bandeja.forEach((pago, index) => {
            const row = document.createElement('tr');
            // Link a la foto en Cloudinary usando el ID de la orden
            const urlFoto = `https://res.cloudinary.com/drxiko8l4/image/upload/pago_${pago.id}.jpg`;
            
            row.innerHTML = `
                <td>Nodo Fiscal Táchira</td>
                <td><b style="color:var(--primary)">${pago.id}</b></td>
                <td>${pago.referencia} / <small>${pago.metodo}</small></td>
                <td>2026-04-02</td>
                <td><span class="status-pill status-warning">VERIFICANDO</span></td>
                <td>
                    <button class="btn btn-action" onclick="window.open('${urlFoto}', '_blank')" title="Ver Capture">
                        <i class="fa-solid fa-image"></i>
                    </button>
                    <button class="btn btn-action" title="Generar Token y Activar" onclick="generarToken('${pago.id}', ${index})">
                        <i class="fa-solid fa-key" style="color:var(--success)"></i>
                    </button>
                </td>
            `;
            contenedor.appendChild(row);
        });
    }

    // FUNCIÓN MAESTRA: ACTIVA Y GUARDA EN EL CONFIG (Simulado)
    function generarToken(idNodo, index) {
        if(!confirm(`¿Autorizar Activación para el Nodo ${idNodo}?`)) return;

        // 1. Lógica de Fecha (Sumar 30 días)
        const d = new Date();
        d.setMonth(d.getMonth() + 1);
        const nuevaFecha = d.toISOString().split('T')[0];

        // 2. Simulamos la actualización del config.js central
        const configActivo = {
            status_licencia: "activo",
            vencimiento: nuevaFecha,
            token_seguridad: "E-XJ92L-ACTIVO-" + Math.random().toString(36).substr(2, 9).toUpperCase()
        };
        
        // Guardamos para que el portal lo lea
        localStorage.setItem('sgf_config_live', JSON.stringify(configActivo));

        // 3. Eliminamos de la bandeja de entrada
        let bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
        bandeja.splice(index, 1);
        localStorage.setItem('bandeja_auditoria', JSON.stringify(bandeja));

        alert(`TOKEN GENERADO EXITOSAMENTE\nNueva fecha de vencimiento: ${nuevaFecha}\nEl nodo ha sido barajado y activado.`);
        
        actualizarDashboard();
        document.getElementById('totalActivos').innerText = parseInt(document.getElementById('totalActivos').innerText) + 1;
    }

    function guardarCliente() {
        const nombre = document.getElementById('nombreMun').value;
        if(!nombre) return alert("Ingrese nombre del municipio");
        alert(`Cliente ${nombre} registrado en la infraestructura SGF.`);
        closeModal();
    }

    // Inicio automático y refresco
    setInterval(actualizarDashboard, 5000);
    actualizarDashboard();
</script>

</body>
</html>
