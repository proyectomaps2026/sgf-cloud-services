<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGF MASTER CONTROL | Terminal de Auditoría</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --master-bg: #0a0e14; 
            --panel-bg: #151c26; 
            --accent: #00e676; 
            --danger: #ff5252; 
            --warning: #f57c00;
            --text: #e0e0e0; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--master-bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* --- ACCESO RESTRINGIDO --- */
        #master-lock { 
            text-align: center; 
            background: var(--panel-bg); 
            padding: 50px; 
            border-radius: 20px; 
            border: 1px solid #2d3748; 
            width: 100%; 
            max-width: 380px; 
        }
        .lock-icon { font-size: 50px; color: var(--danger); margin-bottom: 20px; }
        input[type="password"] { 
            width: 100%; padding: 15px; background: #0a0e14; border: 1px solid #333; 
            color: var(--accent); border-radius: 8px; text-align: center; font-size: 20px; 
            letter-spacing: 4px; margin-bottom: 20px; box-sizing: border-box;
        }
        .btn-unlock { 
            background: var(--danger); color: white; border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; 
        }

        /* --- PANEL DE AUDITORÍA --- */
        #master-panel { display: none; width: 100%; max-width: 900px; padding: 20px; align-self: flex-start; margin-top: 40px; }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #1f2937; padding-bottom: 20px; margin-bottom: 30px; 
        }
        
        .grid-auditoria { display: grid; gap: 20px; }
        .card-auditoria { 
            background: var(--panel-bg); padding: 25px; border-radius: 15px; 
            border: 1px solid #2d3748; display: flex; justify-content: space-between; 
            align-items: center; transition: 0.3s;
        }
        .card-auditoria:hover { border-color: var(--accent); }

        .info-fiscal b { color: var(--accent); font-size: 18px; display: block; margin-bottom: 5px; }
        .info-fiscal p { margin: 3px 0; font-size: 13px; color: #8892b0; }
        
        .btn-check { 
            background: #1f2937; color: white; padding: 10px 15px; 
            border-radius: 6px; text-decoration: none; font-size: 12px; 
            display: inline-block; margin-top: 10px; border: 1px solid #334155;
        }
        .btn-check:hover { background: #334155; }

        .btn-activate { 
            background: var(--accent); color: #0a0e14; border: none; 
            padding: 15px 25px; border-radius: 10px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase;
        }
        .badge-pendiente { background: var(--warning); color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="master-lock">
        <div class="lock-icon"><i class="fa-solid fa-user-shield"></i></div>
        <h2 style="margin:0;">MASTER ACCESS</h2>
        <p style="font-size: 11px; color: #8892b0; margin: 10px 0 25px 0;">CENTRO DE MANDO TÁCHIRA SGF</p>
        <input type="password" id="masterKey" placeholder="••••••">
        <button class="btn-unlock" onclick="verificarAcceso()">INGRESAR AL NODO</button>
    </div>

    <div id="master-panel">
        <div class="header">
            <div>
                <h1 style="margin:0; font-size: 24px;"><i class="fa-solid fa-tower-observation"></i> PANEL DE AUDITORÍA FISCAL</h1>
                <p style="margin:5px 0 0 0; font-size: 12px; color: var(--accent);">CONECTADO A NUBE: drxiko8l4</p>
            </div>
            <div style="text-align: right;">
                <span id="peticiones-count" style="background: var(--danger); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">0 PENDIENTES</span>
            </div>
        </div>

        <div id="lista-auditoria" class="grid-auditoria">
            </div>
    </div>

<script>
    // LLAVE DE TUS 3 SOCIOS Y TÚ
    const KEY_MAESTRA = "AURA2026"; 

    function verificarAcceso() {
        const pass = document.getElementById('masterKey').value;
        if(pass === KEY_MAESTRA) {
            document.getElementById('master-lock').style.display = 'none';
            document.getElementById('master-panel').style.display = 'block';
            iniciarEscucha();
        } else {
            alert("LLAVE INCORRECTA. Acceso denegado.");
        }
    }

    function iniciarEscucha() {
        renderizarLista();
        // Revisar cada 5 segundos si llegó algo nuevo del portal
        setInterval(renderizarLista, 5000);
    }

    function renderizarLista() {
        // Leemos la bandeja compartida (LocalStorage para la prueba de hoy)
        const bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
        const contenedor = document.getElementById('lista-auditoria');
        const contador = document.getElementById('peticiones-count');

        contador.innerText = `${bandeja.length} PENDIENTES`;

        if(bandeja.length === 0) {
            contenedor.innerHTML = '<div style="text-align:center; margin-top:50px; color:#334155;"><i class="fa-solid fa-satellite" style="font-size:40px;"></i><p>Escaneando red en busca de órdenes...</p></div>';
            return;
        }

        contenedor.innerHTML = '';
        bandeja.reverse().forEach((pago, index) => {
            // Reconstruimos la URL de Cloudinary usando tu Cloud Name drxiko8l4
            const urlCloudinary = `https://res.cloudinary.com/drxiko8l4/image/upload/pago_${pago.id}.jpg`;
            
            contenedor.innerHTML += `
                <div class="card-auditoria">
                    <div class="info-fiscal">
                        <b>ORDEN: ${pago.id} <span class="badge-pendiente">EN ESPERA</span></b>
                        <p><i class="fa-solid fa-wallet"></i> ${pago.metodo}</p>
                        <p><i class="fa-solid fa-receipt"></i> REF: ${pago.referencia}</p>
                        <a href="${urlCloudinary}" target="_blank" class="btn-check">
                            <i class="fa-solid fa-image"></i> VER COMPROBANTE CLOUDINARY
                        </a>
                    </div>
                    <button class="btn-activate" onclick="liberarLicencia('${pago.id}', ${index})">
                        <i class="fa-solid fa-bolt"></i> ACTIVAR
                    </button>
                </div>
            `;
        });
    }

    function liberarLicencia(id, index) {
        if(confirm("¿Confirmas la recepción del pago para la Orden " + id + "?")) {
            let bandeja = JSON.parse(localStorage.getItem('bandeja_auditoria') || '[]');
            bandeja.splice(index, 1); // La sacamos de la lista
            localStorage.setItem('bandeja_auditoria', JSON.stringify(bandeja));
            
            alert("PROTOCOLO ACTIVADO. La licencia para el fiscal ha sido liberada en el sistema.");
            renderizarLista();
        }
    }
</script>
</body>
</html>
